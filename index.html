<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Real-Time Age Calculator</title>

  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #020617;
      --accent: #38bdf8;
      --accent-soft: rgba(56, 189, 248, 0.15);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --error: #f97373;
      --border-subtle: rgba(148, 163, 184, 0.35);
      --radius-lg: 20px;
      --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.7);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
        "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%, #000 100%);
      color: var(--text-main);
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .app-wrapper {
      width: 100%;
      max-width: 480px;
    }

    /* Card */

    .card {
      background: radial-gradient(circle at top left, #0b1120 0, #020617 55%);
      border-radius: var(--radius-lg);
      padding: 28px 24px 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(148, 163, 184, 0.25);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(56, 189, 248, 0.17), transparent 70%);
      top: -90px;
      right: -80px;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(129, 140, 248, 0.16), transparent 70%);
      bottom: -60px;
      left: -40px;
      pointer-events: none;
    }

    /* Content */

    .card-header {
      position: relative;
      z-index: 1;
      margin-bottom: 22px;
    }

    .card-header h1 {
      font-size: 1.6rem;
      letter-spacing: 0.03em;
      margin: 0 0 6px;
    }

    .card-header p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Input */

    .card-body {
      position: relative;
      z-index: 1;
    }

    .input-group {
      margin-bottom: 18px;
    }

    .input-group label {
      display: block;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .input-group input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-subtle);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text-main);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .input-group input[type="date"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.4);
      background: rgba(15, 23, 42, 1);
    }

    .input-group input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.8);
      cursor: pointer;
    }

    .error-message {
      min-height: 18px;
      margin: 6px 2px 0;
      font-size: 0.8rem;
      color: var(--error);
    }

    /* Age grid */

    .age-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .age-item {
      padding: 10px 10px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.3);
      background: linear-gradient(
        145deg,
        rgba(15, 23, 42, 0.96),
        rgba(15, 23, 42, 0.8)
      );
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.6);
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-height: 68px;
    }

    .age-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-muted);
    }

    .age-value {
      font-size: 1.35rem;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
    }

    /* Footer */

    .footer {
      margin-top: 14px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Responsive */

    @media (max-width: 480px) {
      .card {
        padding: 22px 18px 18px;
      }

      .card-header h1 {
        font-size: 1.4rem;
      }

      .age-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .age-item {
        min-height: 64px;
      }

      .age-value {
        font-size: 1.25rem;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
      .card {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .card:hover {
        transform: translateY(-3px);
        box-shadow: 0 28px 80px rgba(15, 23, 42, 0.8);
      }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">
    <main class="card">
      <header class="card-header">
        <h1>Real-Time Age Calculator</h1>
        <p>Enter your date of birth to see your age update live.</p>
      </header>

      <section class="card-body">
        <div class="input-group">
          <label for="dob">Date of Birth</label>
          <input type="date" id="dob" />
          <p class="error-message" id="error-message"></p>
        </div>

        <div class="age-grid" id="age-grid">
          <div class="age-item">
            <span class="age-label">Years</span>
            <span class="age-value" id="years">--</span>
          </div>
          <div class="age-item">
            <span class="age-label">Months</span>
            <span class="age-value" id="months">--</span>
          </div>
          <div class="age-item">
            <span class="age-label">Days</span>
            <span class="age-value" id="days">--</span>
          </div>
          <div class="age-item">
            <span class="age-label">Hours</span>
            <span class="age-value" id="hours">--</span>
          </div>
          <div class="age-item">
            <span class="age-label">Minutes</span>
            <span class="age-value" id="minutes">--</span>
          </div>
          <div class="age-item">
            <span class="age-label">Seconds</span>
            <span class="age-value" id="seconds">--</span>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      Credit: Abdul Hakim
    </footer>
  </div>

  <script>
    // Grab DOM elements
    const dobInput = document.getElementById("dob");
    const errorMessage = document.getElementById("error-message");

    const yearsEl = document.getElementById("years");
    const monthsEl = document.getElementById("months");
    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");

    let timerId = null;

    function setMaxDateToToday() {
      const today = new Date();
      const yyyy = today.getFullYear();
      const mm = String(today.getMonth() + 1).padStart(2, "0");
      const dd = String(today.getDate()).padStart(2, "0");
      const formatted = `${yyyy}-${mm}-${dd}`;
      dobInput.max = formatted;
    }

    function resetDisplay() {
      yearsEl.textContent = "--";
      monthsEl.textContent = "--";
      daysEl.textContent = "--";
      hoursEl.textContent = "--";
      minutesEl.textContent = "--";
      secondsEl.textContent = "--";
    }

    function getValidBirthDate() {
      const value = dobInput.value;

      if (!value) {
        errorMessage.textContent = "Please select your date of birth.";
        resetDisplay();
        return null;
      }

      const birthDate = new Date(value);
      const now = new Date();

      if (birthDate.getTime() > now.getTime()) {
        errorMessage.textContent = "Date of birth cannot be in the future.";
        resetDisplay();
        return null;
      }

      errorMessage.textContent = "";
      return birthDate;
    }

    function calculateDetailedAge(birthDate) {
      const now = new Date();

      let years = now.getFullYear() - birthDate.getFullYear();
      const yearAdjusted = new Date(
        birthDate.getFullYear() + years,
        birthDate.getMonth(),
        birthDate.getDate(),
        birthDate.getHours(),
        birthDate.getMinutes(),
        birthDate.getSeconds()
      );

      if (yearAdjusted > now) {
        years--;
      }

      const afterYears = new Date(
        birthDate.getFullYear() + years,
        birthDate.getMonth(),
        birthDate.getDate(),
        birthDate.getHours(),
        birthDate.getMinutes(),
        birthDate.getSeconds()
      );

      let months = 0;
      let temp = new Date(afterYears);
      while (true) {
        const next = new Date(
          temp.getFullYear(),
          temp.getMonth() + 1,
          temp.getDate(),
          temp.getHours(),
          temp.getMinutes(),
          temp.getSeconds()
        );
        if (next <= now) {
          months++;
          temp = next;
        } else {
          break;
        }
      }

      const afterMonths = new Date(temp);

      let remainingMs = now.getTime() - afterMonths.getTime();

      const msPerSecond = 1000;
      const msPerMinute = msPerSecond * 60;
      const msPerHour = msPerMinute * 60;
      const msPerDay = msPerHour * 24;

      const days = Math.floor(remainingMs / msPerDay);
      remainingMs -= days * msPerDay;

      const hours = Math.floor(remainingMs / msPerHour);
      remainingMs -= hours * msPerHour;

      const minutes = Math.floor(remainingMs / msPerMinute);
      remainingMs -= minutes * msPerMinute;

      const seconds = Math.floor(remainingMs / msPerSecond);

      return { years, months, days, hours, minutes, seconds };
    }

    function renderAge(age) {
      yearsEl.textContent = age.years;
      monthsEl.textContent = age.months;
      daysEl.textContent = age.days;
      hoursEl.textContent = age.hours;
      minutesEl.textContent = age.minutes;
      secondsEl.textContent = age.seconds;
    }

    function startAgeTimer() {
      const birthDate = getValidBirthDate();
      if (!birthDate) {
        if (timerId !== null) {
          clearInterval(timerId);
          timerId = null;
        }
        return;
      }

      if (timerId !== null) {
        clearInterval(timerId);
      }

      const initialAge = calculateDetailedAge(birthDate);
      renderAge(initialAge);

      timerId = setInterval(() => {
        const age = calculateDetailedAge(birthDate);
        renderAge(age);
      }, 1000);
    }

    function init() {
      setMaxDateToToday();
      dobInput.addEventListener("change", startAgeTimer);
    }

    init();
  </script>
</body>
</html>
